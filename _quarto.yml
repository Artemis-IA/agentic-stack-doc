project:
  type: website
  output-dir: _site
  preview:
    port: 4200
    browser: true

website:
  title: "Stack Agentic — Documentation Vivante"
  description: "Documentation interactive et auto-mise-à-jour sur l'écosystème des systèmes agentic : LLMs, harnesses, sandboxes, hardware, skills, frameworks."
  favicon: assets/favicon.svg
  search:
    location: navbar
    type: overlay
    limit: 50
  sidebar:
    style: "docked"
    collapse-level: 2
    contents:
      - section: "Accueil"
        contents:
          - text: "Vue d'ensemble" 
