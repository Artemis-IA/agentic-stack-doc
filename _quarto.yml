      © 2026 Stack Agentic Doc · Mis à jour automatiquement via CI/CD
    right: |
      Construit avec [Quarto](https://quarto.org) · [Source](https://github.com/imohamma/agentic-stack-doc)
  repo-url: https://github.com/imohamma/agentic-stack-doc
  repo-actions: [edit, issue]
  issue-url: https://github.com/imohamma/agentic-stack-doc/issues
  navbar:
    background: dark
    foreground: light
    right:
      - icon: rss
        href: content/veille/index.qmd
      - text: "Version"
        href: changelog.qmd

format:
  html:
    theme:
      light: [cosmo, assets/custom.scss]
      dark: [darkly, assets/custom-dark.scss]
    css: assets/styles.css
    toc: true
    toc-depth: 3
    number-sections: false
    highlight-style: github
    code-fold: false
    code-link: true
    link-external-icon: true
    link-external-newwindow: true
    fig-responsive: true
    mermaid:
      theme: dark

execute:
  freeze: true
  echo: false
  warning: false

bibliography: references.bib
link-citations: true
